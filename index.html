<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe 65</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Roboto',sans-serif;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#f8f9fa;
  border-bottom:1px solid #ddd;
  position:relative;
}

.logo{
  width:70px;
  height:70px;
}

/* NAV */
.header-center{
  display:flex;
  gap:15px;
}

.header-center a{
  text-decoration:none;
  color:#333;
  font-weight:500;
}

.header-center a:hover{
  color:#28a745;
}

/* ICONS */
.header-right{
  display:flex;
  gap:10px;
  align-items:center;
}

.icon{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#e6f0ff;
  color:blue;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 6px rgba(0,0,0,0.2);
}

/* HERO */
.hero{
  height:60vh;
  position:relative;
  overflow:hidden;
}

.slider{
  width:100%;
  height:100%;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  opacity:0;
  transition:0.8s;
}

.slide.active{
  opacity:1;
}

/* GALLERY */
.gallery-section{
  padding:40px 20px;
  text-align:center;
}

.gallery-title{
  font-size:28px;
  margin-bottom:20px;
}

.gallery-container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.gallery-item img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.gallery-item img:hover{
  transform:scale(1.05);
}

/* FOOTER */
.footer{
  background:#1c1c1c;
  color:white;
  padding:40px 20px;
}

.footer-container{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
}

/* MOBILE */
@media(max-width:768px){

  /* HIDE MENU */
  .header-center{
    display:none;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    background:white;
    flex-direction:column;
    padding:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    z-index:999;
  }

  .header-center.show{
    display:flex;
  }

  .gallery-container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="logo.jpg" class="logo">

  <nav class="header-center">
    <a href="#">Home</a>
    <a href="#">Book</a>
    <a href="#">Order</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
  </nav>

  <div class="header-right">
    <div class="icon">👤</div>
    <div class="icon">🛒</div>
    <div class="icon" onclick="toggleMenu()">☰</div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slider">
    <div class="slide active" style="background:#28a745;">
      <h1>Book Your Table</h1>
      <p>Fresh Coffee & Food</p>
    </div>

    <div class="slide" style="background:#1e7e34;">
      <h1>Welcome to Cafe 65</h1>
      <p>Best Taste in Town</p>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery-section">
  <h2 class="gallery-title">Our Cafe Gallery</h2>

  <div class="gallery-container">
    <div class="gallery-item"><img src="gallery1.jpg"></div>
    <div class="gallery-item"><img src="gallery2.jpg"></div>
    <div class="gallery-item"><img src="gallery3.jpg"></div>
    <div class="gallery-item"><img src="gallery4.jpg"></div>
  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-container">
    <div>
      <h3>Quick Links</h3>
      <p>Book Now</p>
      <p>Order Online</p>
      <p>Menu</p>
    </div>
  </div>
</div>

<!-- SLIDER JS -->
<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
},3000);
</script>

<!-- MENU TOGGLE -->
<script>
function toggleMenu(){
  document.querySelector(".header-center").classList.toggle("show");
}
</script>

</body>
</html>
