<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe 65</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#fff;
  border-bottom:1px solid #ddd;
  flex-wrap:wrap;
}

.logo{
  width:90px;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

nav a{
  text-decoration:none;
  color:#333;
  font-weight:500;
  font-size:15px;
}

nav a:hover{
  color:#28a745;
}

.header-icons{
  display:flex;
  gap:10px;
}

.icon{
  width:40px;
  height:40px;
  background:#28a745;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
}

/* HERO */
.hero{
  height:60vh;
  position:relative;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
  opacity:0;
  transition:0.8s;
}

.slide.active{
  opacity:1;
}

.slide h1{
  font-size:40px;
}

.slide p{
  margin-top:10px;
}

/* GALLERY */
.gallery{
  padding:40px 20px;
  text-align:center;
}

.gallery h2{
  margin-bottom:20px;
}

.gallery-container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* FOOTER */
.footer{
  background:#1c1c1c;
  color:#fff;
  padding:40px 20px;
}

.footer-container{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
}

.footer-left input{
  padding:10px;
  width:70%;
  border:none;
}

.footer-left button{
  padding:10px;
  background:#28a745;
  color:#fff;
  border:none;
}

.social{
  margin-top:15px;
}

.social span{
  margin-right:10px;
  font-size:22px;
  cursor:pointer;
}

.footer-bottom{
  text-align:center;
  margin-top:20px;
  border-top:1px solid #444;
  padding-top:10px;
}

/* MOBILE */
@media(max-width:768px){

  .hero{
    height:50vh;
  }

  .slide h1{
    font-size:24px;
  }

  .gallery-container{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="logo.jpg" class="logo">

  <nav>
    <a href="#">Home</a>
    <a href="#">Book</a>
    <a href="#">Order</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
  </nav>

  <div class="header-icons">
    <div class="icon">🔍</div>
    <div class="icon">👤</div>
    <div class="icon">🛒</div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slide active" style="background:#28a745;">
    <h1>Reserve Your Table</h1>
    <p>Enjoy Fresh Coffee & Snacks</p>
  </div>

  <div class="slide" style="background:#218838;">
    <h1>Welcome to Cafe 65</h1>
    <p>Delicious Food & Great Ambience</p>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <h2>Our Cafe Gallery</h2>

  <div class="gallery-container">
    <img src="gallery1.jpg">
    <img src="gallery2.jpg">
    <img src="gallery3.jpg">
    <img src="gallery4.jpg">
  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-container">

    <div class="footer-left">
      <h3>Get 10% Off</h3>
      <input type="email" placeholder="Enter email">
      <button>Send</button>

      <div class="social">
        <span></span> <!-- WhatsApp -->
        <span></span> <!-- Instagram -->
        <span></span> <!-- Telegram -->
      </div>
    </div>

    <div>
      <h4>Quick Links</h4>
      <p>Book Now</p>
      <p>Order</p>
      <p>Menu</p>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 Cafe 65 | Powered by arun.webcraft@gmail.com
  </div>
</div>

<!-- SLIDER SCRIPT -->
<script>
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
